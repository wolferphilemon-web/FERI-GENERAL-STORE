{% extends "base.html" %}

{% block title %}Edit Product | FERI GENERAL STORE{% endblock %}

{% block content %}
<section class="page-shell">
    <div class="page-card" style="max-width:720px; margin:auto;">
        <div class="section-heading">
            <p class="eyebrow">Product update</p>
            <h1>Edit Product</h1>
        </div>

        <div style="text-align:center; margin-bottom:24px;">
            <img src="{{ url_for('static', filename='uploads/' + product.image) }}" width="220" style="border-radius:15px; box-shadow:0 10px 20px rgba(0,0,0,.15);">
        </div>

        <form method="POST">
            <label><strong>Product Name</strong></label>
            <input type="text" name="name" value="{{ product.name }}" required>

            <label><strong>Price (Ksh)</strong></label>
            <input type="number" name="price" value="{{ product.price }}" required>

            <label><strong>Image Filename</strong></label>
            <input type="text" name="image" value="{{ product.image }}" required>

            <div style="display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-top:24px;">
                <button type="submit" class="btn btn-primary">💾 Save Changes</button>
                <a href="{{ url_for('admin') }}" class="btn btn-secondary">← Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
