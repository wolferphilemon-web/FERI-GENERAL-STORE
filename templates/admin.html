<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>
    <h1>Admin Dashboard</h1>
</header>

<div style="padding:30px; max-width:900px; margin:auto;">

    <h2>Add New Product</h2>

    <form method="POST" action="/add_product">

        <label>Product Name</label><br>
        <input type="text" name="name" placeholder="Enter product name" required><br><br>

        <label>Price (Ksh)</label><br>
        <input type="number" name="price" placeholder="Enter price" required><br><br>

        <label>Image Filename</label><br>
        <input type="text" name="image" placeholder="example.jpg" required><br><br>

        <button type="submit">Add Product</button>

    </form>

    <hr><br>

    <h2>All Products</h2>

    <table border="1" cellpadding="10" cellspacing="0" style="width:100%; border-collapse:collapse; text-align:center;">

        <tr>
            <th>ID</th>
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Actions</th>
        </tr>

        {% for product in products %}

        <tr>

            <td>{{ product.id }}</td>

            <td>
                <img src="{{ url_for('static', filename='images/' + product.image) }}"
                     width="80">
            </td>

            <td>{{ product.name }}</td>

            <td>Ksh {{ product.price }}</td>

            <td>

                <a href="/edit_product/{{ product.id }}">
                    <button>Edit</button>
                </a>

                <a href="/delete_product/{{ product.id }}">
                    <button onclick="return confirm('Are you sure you want to delete this product?')">
                        Delete
                    </button>
                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
